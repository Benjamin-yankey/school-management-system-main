version: '3.9'

services:
  # ─── Infrastructure ───────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: school_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: school_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 256M

  redis:
    image: redis:7-alpine
    container_name: school_redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 64M

  redpanda:
    image: redpandadata/redpanda:latest
    container_name: school_redpanda
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 256M
      - --overprovisioned
      - --kafka-addr PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:9092
    ports:
      - '9092:9092'
      - '9644:9644'
    healthcheck:
      test: ['CMD', 'rpk', 'cluster', 'info']
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 384M

  redpanda-init:
    image: redpandadata/redpanda:latest
    container_name: school_redpanda_init
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: >
      bash -c "
        rpk --brokers redpanda:9092 topic create user.find-by-email --if-not-exists &&
        rpk --brokers redpanda:9092 topic create user.find-by-email.reply --if-not-exists &&
        rpk --brokers redpanda:9092 topic create auth.verify-password --if-not-exists &&
        rpk --brokers redpanda:9092 topic create auth.verify-password.reply --if-not-exists &&
        rpk --brokers redpanda:9092 topic create auth.credentials-create --if-not-exists &&
        rpk --brokers redpanda:9092 topic create auth.credentials-update --if-not-exists &&
        rpk --brokers redpanda:9092 topic create school.validate --if-not-exists &&
        rpk --brokers redpanda:9092 topic create school.validate.reply --if-not-exists &&
        rpk --brokers redpanda:9092 topic create notification.email --if-not-exists &&
        echo 'Topics created.'
      "
    restart: on-failure

  # ─── Monitoring ───────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:latest
    container_name: school_prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
    ports:
      - '9090:9090'
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  loki:
    image: grafana/loki:latest
    container_name: school_loki
    ports:
      - '3100:3100'
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

  alloy:
    image: grafana/alloy:latest
    container_name: school_alloy
    volumes:
      - ./monitoring/alloy/config.alloy:/etc/alloy/config.alloy
      - //var/run/docker.sock:/var/run/docker.sock
    command: run --server.http.listen-addr=0.0.0.0:12345 /etc/alloy/config.alloy
    ports:
      - '12345:12345'
    depends_on:
      - loki
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

  grafana:
    image: grafana/grafana:latest
    container_name: school_grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards
    ports:
      - '3333:3000'
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

  # ─── Services ─────────────────────────────────────────────────────────────────

  auth-service:
    build: ./auth-service
    container_name: school_auth
    env_file: ./auth-service/.env
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda-init:
        condition: service_completed_successfully
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  user-service:
    build: ./user-service
    container_name: school_user
    env_file: ./user-service/.env
    ports:
      - '3002:3002'
    depends_on:
      postgres:
        condition: service_healthy
      redpanda-init:
        condition: service_completed_successfully
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  school-service:
    build: ./school-service
    container_name: school_school
    env_file: ./school-service/.env
    ports:
      - '3003:3003'
    depends_on:
      postgres:
        condition: service_healthy
      redpanda-init:
        condition: service_completed_successfully
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  notification-service:
    build: ./notification-service
    container_name: school_notification
    env_file: ./notification-service/.env
    depends_on:
      postgres:
        condition: service_healthy
      redpanda-init:
        condition: service_completed_successfully
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 192M

  api-gateway:
    build: ./api-gateway
    container_name: school_gateway
    env_file: ./api-gateway/.env
    ports:
      - '3000:3000'
    depends_on:
      - auth-service
      - user-service
      - school-service
      - redis
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 192M

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
